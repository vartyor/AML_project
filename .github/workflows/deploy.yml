name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 배포 전 유효성 검사
  # ──────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 핵심 의존성 설치 (빠른 검증용)
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas numpy xgboost joblib

      - name: app.py 구문 검사
        run: |
          python -c "
          import ast, sys
          with open('app.py', 'r', encoding='utf-8') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('app.py syntax OK')
          except SyntaxError as e:
              print('SyntaxError:', e)
              sys.exit(1)
          "

      - name: requirements.txt 존재 확인
        run: |
          if [ ! -f requirements.txt ]; then
            echo "requirements.txt not found"
            exit 1
          fi
          echo "requirements.txt OK"

  # ──────────────────────────────────────────────
  # Job 2: Hugging Face Spaces 자동 배포
  #
  # GitHub Secrets 에 HF_TOKEN 등록 필요
  # (HF Settings > Access Tokens > Write 권한)
  # ──────────────────────────────────────────────
  deploy-to-hf:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: pre-deploy-check

    steps:
      - name: 코드 체크아웃 (전체 히스토리)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Git LFS 설치
        run: git lfs install

      - name: Hugging Face Spaces 에 push (orphan — 히스토리 없이 현재 상태만)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_USERNAME="Vartyor"
          HF_SPACE_NAME="aml-project"

          git config user.email "action@github.com"
          git config user.name "GitHub Actions"

          git remote add hf \
            https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}

          # 히스토리 없는 새 브랜치 생성
          # → 과거 커밋의 대용량 파일이 전송되지 않음
          git checkout --orphan hf-deploy

          # .gitattributes 기반으로 LFS 파일 자동 변환하며 스테이징
          git add -A

          git commit -m "deploy: $(date '+%Y-%m-%d %H:%M:%S')"

          # LFS 오브젝트 먼저 업로드 후 커밋 push
          git lfs push hf --all
          git push hf hf-deploy:main --force

      - name: 배포 완료 알림
        run: |
          echo "## Hugging Face Spaces 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 브랜치 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 배포자 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
