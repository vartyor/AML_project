name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 수동 배포 트리거 허용

jobs:
  # ──────────────────────────────────────────────
  # Job 1: CI 통과 여부 확인 후 배포
  # ──────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 핵심 의존성 설치 (빠른 검증용)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install streamlit pandas numpy xgboost joblib

      - name: app.py 임포트 구문 검사
        run: |
          python -c "
          import ast, sys
          with open('app.py', 'r', encoding='utf-8') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('✅ app.py 구문 검사 통과')
          except SyntaxError as e:
              print(f'❌ 구문 오류: {e}')
              sys.exit(1)
          "

      - name: requirements.txt 존재 확인
        run: |
          if [ ! -f requirements.txt ]; then
            echo "❌ requirements.txt 파일이 없습니다."
            exit 1
          fi
          echo "✅ requirements.txt 확인 완료"
          echo "📦 패키지 목록:"
          cat requirements.txt

  # ──────────────────────────────────────────────
  # Job 2: Hugging Face Spaces 자동 배포
  #
  # 사전 준비:
  #   GitHub Secrets 에 HF_TOKEN 등록
  #   (HF 프로필 → Settings → Access Tokens → Write 권한)
  # ──────────────────────────────────────────────
  deploy-to-hf:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: pre-deploy-check

    steps:
      - name: 코드 체크아웃 (전체 히스토리)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 커밋 히스토리 필요 (HF push 시 충돌 방지)

      - name: Hugging Face Spaces 에 push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # HF Spaces git 원격 추가 후 강제 push
          # ※ HF_USERNAME, HF_SPACE_NAME 을 본인 값으로 변경하세요
          HF_USERNAME="Vartyor"
          HF_SPACE_NAME="aml-project"

          git config user.email "action@github.com"
          git config user.name  "GitHub Actions"

          git remote add hf \
            https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}

          git push hf main --force

      - name: 배포 완료 알림 (GitHub Summary)
        run: |
          echo "## 🚀 Hugging Face Spaces 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **앱 이름** | 자금 세탁 경로 탐지 시스템 |" >> $GITHUB_STEP_SUMMARY
          echo "| **브랜치** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **커밋** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **배포자** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **시각** | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
