name: Deploy to Streamlit Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 수동 배포 트리거 허용

jobs:
  # ──────────────────────────────────────────────
  # Job 1: CI 통과 여부 확인 후 배포
  # ──────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 핵심 의존성 설치 (빠른 검증용)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install streamlit pandas numpy xgboost joblib

      - name: app.py 임포트 구문 검사
        run: |
          python -c "
          import ast, sys
          with open('app.py', 'r', encoding='utf-8') as f:
              source = f.read()
          try:
              ast.parse(source)
              print('✅ app.py 구문 검사 통과')
          except SyntaxError as e:
              print(f'❌ 구문 오류: {e}')
              sys.exit(1)
          "

      - name: requirements.txt 존재 확인
        run: |
          if [ ! -f requirements.txt ]; then
            echo "❌ requirements.txt 파일이 없습니다."
            exit 1
          fi
          echo "✅ requirements.txt 확인 완료"
          echo "📦 패키지 목록:"
          cat requirements.txt

  # ──────────────────────────────────────────────
  # Job 2: Streamlit Cloud 배포 알림
  #
  # 참고: Streamlit Cloud는 GitHub main 브랜치에
  # push가 발생하면 자동으로 재배포됩니다.
  # 이 Job은 배포 성공 여부를 Slack/Discord 등으로
  # 알리는 역할을 합니다. (선택 사항)
  # ──────────────────────────────────────────────
  notify-deploy:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: pre-deploy-check

    steps:
      - name: 배포 성공 알림 (GitHub Summary)
        run: |
          echo "## 🚀 Streamlit Cloud 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **앱 이름** | 자금 세탁 경로 탐지 시스템 |" >> $GITHUB_STEP_SUMMARY
          echo "| **브랜치** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **커밋** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **트리거** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **시각** | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Streamlit Cloud가 자동으로 최신 main 브랜치를 반영합니다." >> $GITHUB_STEP_SUMMARY

      # (선택) Slack 웹훅 알림 — SLACK_WEBHOOK_URL 시크릿 등록 시 활성화
      # - name: Slack 알림
      #   if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      #   uses: slackapi/slack-github-action@v1.26.0
      #   with:
      #     payload: |
      #       {
      #         "text": "🚀 *AML 탐지 시스템* 배포 완료\n커밋: `${{ github.sha }}`\n배포자: ${{ github.actor }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
