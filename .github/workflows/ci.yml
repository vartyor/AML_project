name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 단위 테스트 (pytest)
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: 의존성 설치 (CPU-only PyTorch)
        run: |
          python -m pip install --upgrade pip
          # CPU 전용 PyTorch 설치 (CI 환경 최적화, GPU 불필요)
          pip install torch==2.2.2+cpu torchvision==0.17.2+cpu \
            --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric==2.5.2
          # sentence-transformers (RAG 임베딩 — API 키 불필요)
          pip install sentence-transformers langchain-huggingface
          # Groq SDK
          pip install groq
          # 나머지 의존성 설치
          pip install -r requirements.txt --no-deps || pip install -r requirements.txt
          # 테스트 전용 의존성
          pip install pytest pytest-cov

      - name: 테스트 실행
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --ignore=tests/integration \
            -m "not slow"

      - name: 커버리지 리포트 업로드
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # Job 2: 의존성 보안 검사 (pip-audit)
  # ──────────────────────────────────────────────
  security:
    name: Dependency Security Scan (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: pip-audit 설치
        run: pip install pip-audit

      - name: 보안 취약점 스캔
        run: |
          pip-audit -r requirements.txt \
            --format=json \
            --output=audit-report.json \
            --ignore-vuln PYSEC-2022-42969 || true
          # 결과를 읽기 쉽게 출력
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2022-42969

      - name: 보안 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30
